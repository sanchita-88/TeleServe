# Java Util Logging configuration for TeleServe.
# To use: pass -Djava.util.logging.config.file=/path/to/WEB-INF/logging.properties to the JVM,
# or configure your container to use this file.

.level=INFO
java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format=%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS %4$s %2$s %5$s%6$s%n

# Application loggers (com.teleserve uses AppLogger -> java.util.logging)
com.teleserve.level=INFO
javax.servlet.level=WARNING
java.sql.level=WARNING
